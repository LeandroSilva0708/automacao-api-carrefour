name: Pipeline de Testes de API - ServeRest

# Gatilho: Quando essa pipeline vai rodar?
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  executar-testes:
    runs-on: ubuntu-latest 

    steps:
    - name: 1. Baixar o código do repositório
      uses: actions/checkout@v4

    - name: 2. Preparar ambiente instalando o Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 3. Instalar o Newman e o Gerador de Relatório HTML
      run: |
        npm install -g newman
        npm install -g newman-reporter-htmlextra

    - name: 4. Rodar os testes da API
      run: |
        newman run ./postman/collection.json \
        -e ./postman/environment.json \
        --delay-request 500 \
        -r htmlextra,cli \
        --reporter-htmlextra-export ./reports/Relatorio-API.html

    - name: 5. Salvar o Relatório como Artefato
      uses: actions/upload-artifact@v4
      if: always() # CRÍTICO: Salva o relatório mesmo se um teste falhar!
      with:
        name: Relatorio-Testes-API
        path: ./reports/Relatorio-API.html
        
